name: CI Workflow

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint HTML, CSS, JS
    runs-on: ubuntu-latest

    steps:
      # checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # set up Node.js for the linters
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # install linters
      - name: Install linters
        run: |
          npm install --save-dev stylelint stylelint-config-standard@latest
          npm install --save-dev htmlhint
          npm install --save-dev @eslint/eslintrc

      # run HTML linter
      - name: Lint HTML files
        run: npx htmlhint "**/*.html"

      # run CSS linter
      - name: Lint CSS files
        run: npx stylelint "**/*.css"

      # run JavaScript linter
      - name: Lint JavaScript files
        run: npx eslint "**/*.js"
