name: CI Workflow

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint HTML, CSS, JS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'          # ← caches node_modules between runs

      - name: Install dependencies
        run: npm ci              # ← requires package-lock.json in repo

      - name: Lint HTML files
        run: |
          echo "HTML files found: $(find . -name '*.html' -not -path '*/node_modules/*' | wc -l)"
          npx htmlhint "**/*.html"
          echo "HTML linting complete"

      - name: Lint CSS files
        run: |
          echo "CSS files found: $(find . -name '*.css' -not -path '*/node_modules/*' | wc -l)"
          npx stylelint "**/*.css" --reporter verbose
          echo "CSS linting complete — no errors found"


      - name: Lint JavaScript files
        run: |
          echo "JS files found: $(find . -name '*.js' -not -path '*/node_modules/*' | wc -l)"
          npx eslint "**/*.js" && echo "JS linting complete — no errors found"